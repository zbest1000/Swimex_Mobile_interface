version: "3.8"

services:
  # SwimEx EDGE Server (with embedded Aedes MQTT broker)
  edge-server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: edge-server
    ports:
      - "80:80"
      - "502:502"
      - "1883:1883"
      - "9001:9001"
    volumes:
      - edge-data:/data
      - edge-config:/config
    env_file:
      - .env
    environment:
      - HTTP_PORT=80
      - MODBUS_PORT=502
      - MQTT_PORT=1883
      - MQTT_WS_PORT=9001
      - POOL_ID=default
      - LOG_LEVEL=info
      - DATA_DIR=/data
      - CONFIG_DIR=/config
      - SIMULATOR_MODE=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - edge-internal

  # Simulator mode (for development/testing)
  edge-server-sim:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: edge-server-sim
    ports:
      - "8080:80"
      - "1884:1883"
      - "9002:9001"
      - "5020:502"
    volumes:
      - edge-sim-data:/data
    environment:
      - HTTP_PORT=80
      - MODBUS_PORT=502
      - MQTT_PORT=1883
      - MQTT_WS_PORT=9001
      - POOL_ID=sim-pool
      - LOG_LEVEL=debug
      - DATA_DIR=/data
      - SIMULATOR_MODE=true
    profiles:
      - simulator
    networks:
      - edge-internal

volumes:
  edge-data:
  edge-config:
  edge-sim-data:

networks:
  edge-internal:
    driver: bridge
