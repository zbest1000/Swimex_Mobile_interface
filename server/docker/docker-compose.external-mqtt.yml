version: "3.8"

# Override: use external Eclipse Mosquitto instead of embedded Aedes broker.
# Usage: docker compose -f docker-compose.yml -f docker-compose.external-mqtt.yml up

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edge-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../config/mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - edge-internal

  edge-server:
    ports:
      - "80:80"
      - "502:502"
    environment:
      - MQTT_EXTERNAL=true
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    depends_on:
      mosquitto:
        condition: service_healthy

volumes:
  mosquitto-data:
  mosquitto-log:
