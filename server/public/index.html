<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D1B2A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="SwimEx EDGE — Pool Control System">
  <title>SwimEx EDGE</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* Inline critical CSS for splash — renders before stylesheet loads */
    body { margin: 0; background: #0D1B2A; }
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(145deg, #0D1B2A 0%, #1B4965 100%);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 350ms ease, visibility 350ms ease;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-content { text-align: center; padding: 2rem; }
    .splash-logo { width: 180px; height: auto; margin: 0 auto 1.5rem; display: block; filter: brightness(0) invert(1); }
    .splash-title { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: 0.04em; margin: 0 0 0.25rem; font-family: system-ui, sans-serif; }
    .splash-subtitle { font-size: 1rem; color: rgba(255,255,255,0.7); margin: 0 0 2rem; letter-spacing: 0.1em; font-family: system-ui, sans-serif; }
    .splash-spinner {
      width: 44px; height: 44px; margin: 0 auto;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: #62B6CB;
      border-radius: 50%; animation: sp .7s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="splash" class="splash">
      <div class="splash-content">
        <img src="/assets/logo.svg" alt="SwimEx EDGE" class="splash-logo">
        <h1 class="splash-title">SwimEx EDGE</h1>
        <p class="splash-subtitle">Connecting...</p>
        <div class="splash-spinner"></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/workout-ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
