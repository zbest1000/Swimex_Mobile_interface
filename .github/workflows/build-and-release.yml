name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      build_linux:
        description: 'Build self-contained Linux x64 package'
        required: false
        type: boolean
        default: true
      build_docker:
        description: 'Build and push Docker image'
        required: false
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows portable EXE package'
        required: false
        type: boolean
        default: true
      build_rpi:
        description: 'Build Raspberry Pi ARM package'
        required: false
        type: boolean
        default: true
      create_release:
        description: 'Create GitHub release with deployment artifacts'
        required: false
        type: boolean
        default: true
      docker_registry:
        description: 'Docker registry (ghcr.io or docker.io)'
        required: false
        type: string
        default: 'ghcr.io'

env:
  DOCKER_IMAGE_NAME: swimex/edge-server
  NODE_VERSION: '20'

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────────────────
  # Generic server build (Linux x64 tarball + zip)
  # ──────────────────────────────────────────────────────────
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build TypeScript
        working-directory: server
        run: npx tsc

      - name: Run tests
        working-directory: server
        run: npm test

      - name: Create release archive
        run: |
          mkdir -p release/server
          cp -r server/dist release/server/
          cp -r server/public release/server/
          cp -r server/config release/server/
          cp -r server/templates release/server/
          cp server/package.json server/package-lock.json release/server/
          cp -r server/docker release/server/
          cp -r server/installer release/server/
          cp README.md release/
          cp QUICKSTART.md release/ 2>/dev/null || true
          cp MANUAL.md release/ 2>/dev/null || true
          cd release && tar -czf ../swimex-edge-server-${{ inputs.release_tag }}.tar.gz .
          cd .. && zip -r swimex-edge-server-${{ inputs.release_tag }}.zip release/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            swimex-edge-server-${{ inputs.release_tag }}.tar.gz
            swimex-edge-server-${{ inputs.release_tag }}.zip
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Linux x64 self-contained package
  # Bundles portable Node.js binary + compiled app + prod deps
  # Works on Ubuntu, Debian, Fedora, RHEL, SUSE, Arch, etc.
  # ──────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    if: ${{ inputs.build_linux }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build TypeScript
        working-directory: server
        run: npx tsc

      - name: Download portable Node.js for Linux x64
        run: |
          NODE_FULL_VERSION="$(node -v | sed 's/^v//')"
          URL="https://nodejs.org/dist/v${NODE_FULL_VERSION}/node-v${NODE_FULL_VERSION}-linux-x64.tar.xz"
          echo "Downloading Node.js ${NODE_FULL_VERSION} from ${URL}"
          curl -fsSL "${URL}" -o node-portable.tar.xz
          tar -xf node-portable.tar.xz
          cp "node-v${NODE_FULL_VERSION}-linux-x64/bin/node" node

      - name: Install production dependencies
        working-directory: server
        run: |
          rm -rf node_modules
          npm ci --production

      - name: Package Linux release
        run: |
          TAG="${{ inputs.release_tag }}"
          PKG="swimex-edge-server-${TAG}-linux-x64"
          mkdir -p "${PKG}"

          cp node "${PKG}/node"
          chmod +x "${PKG}/node"
          cp -r server/dist "${PKG}/"
          cp -r server/node_modules "${PKG}/"
          cp -r server/public "${PKG}/"
          cp -r server/config "${PKG}/"
          cp -r server/templates "${PKG}/"
          cp server/package.json "${PKG}/"

          cp server/installer/linux/install.sh "${PKG}/install-service.sh" 2>/dev/null || true
          cp README.md "${PKG}/" 2>/dev/null || true
          cp MANUAL.md "${PKG}/" 2>/dev/null || true

          cat > "${PKG}/swimex-edge-server.sh" << 'LAUNCHER'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export HTTP_PORT="${HTTP_PORT:-80}"
          export MODBUS_PORT="${MODBUS_PORT:-502}"
          export MQTT_PORT="${MQTT_PORT:-1883}"
          export DATA_DIR="${DATA_DIR:-${SCRIPT_DIR}/data}"
          export CONFIG_DIR="${CONFIG_DIR:-${SCRIPT_DIR}/config}"
          mkdir -p "${DATA_DIR}"
          echo "========================================"
          echo " SwimEx EDGE Server"
          echo "========================================"
          echo " Web UI:  http://0.0.0.0:${HTTP_PORT}"
          echo " Data:    ${DATA_DIR}"
          echo " Press Ctrl+C to stop."
          echo "========================================"
          exec "${SCRIPT_DIR}/node" "${SCRIPT_DIR}/dist/app/index.js"
          LAUNCHER
          chmod +x "${PKG}/swimex-edge-server.sh"

          tar -czf "swimex-edge-server-${TAG}-linux-x64.tar.gz" "${PKG}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-build
          path: swimex-edge-server-${{ inputs.release_tag }}-linux-x64.tar.gz
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Windows portable EXE package
  # Bundles node.exe + compiled app + production deps
  # ──────────────────────────────────────────────────────────
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    if: ${{ inputs.build_windows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build TypeScript
        working-directory: server
        run: npx tsc

      - name: Download portable Node.js
        shell: pwsh
        run: |
          $nodeFullVersion = (node -v).TrimStart('v')
          $url = "https://nodejs.org/dist/v${nodeFullVersion}/node-v${nodeFullVersion}-win-x64.zip"
          Write-Host "Downloading Node.js $nodeFullVersion from $url"
          Invoke-WebRequest -Uri $url -OutFile node-portable.zip
          Expand-Archive -Path node-portable.zip -DestinationPath node-portable-extract
          $extractedDir = Get-ChildItem node-portable-extract | Select-Object -First 1
          Copy-Item "$($extractedDir.FullName)\node.exe" -Destination node.exe

      - name: Install production dependencies
        shell: pwsh
        run: |
          Set-Location server
          Remove-Item -Recurse -Force node_modules
          npm ci --production

      - name: Package Windows release
        shell: pwsh
        run: |
          $tag = "${{ inputs.release_tag }}"
          $releaseDir = "swimex-edge-server-${tag}-windows-x64"
          New-Item -ItemType Directory -Path $releaseDir -Force

          Copy-Item node.exe "$releaseDir\node.exe"
          Copy-Item -Recurse server\dist "$releaseDir\dist"
          Copy-Item -Recurse server\node_modules "$releaseDir\node_modules"
          Copy-Item -Recurse server\public "$releaseDir\public"
          Copy-Item -Recurse server\config "$releaseDir\config"
          Copy-Item -Recurse server\templates "$releaseDir\templates"
          Copy-Item server\package.json "$releaseDir\package.json"

          if (Test-Path server\installer\windows\install.ps1) {
            Copy-Item server\installer\windows\install.ps1 "$releaseDir\install-service.ps1"
          }
          if (Test-Path MANUAL.md) { Copy-Item MANUAL.md "$releaseDir\MANUAL.md" }
          if (Test-Path README.md) { Copy-Item README.md "$releaseDir\README.md" }

          @"
          @echo off
          title SwimEx EDGE Server
          echo ========================================
          echo  SwimEx EDGE Server $tag
          echo ========================================
          echo.
          echo Starting server...
          echo Press Ctrl+C to stop.
          echo.
          set HTTP_PORT=80
          set MODBUS_PORT=502
          set MQTT_PORT=1883
          set DATA_DIR=%~dp0data
          set CONFIG_DIR=%~dp0config
          "%~dp0node.exe" "%~dp0dist\app\index.js"
          pause
          "@ | Out-File -FilePath "$releaseDir\swimex-edge-server.bat" -Encoding ascii

          @"
          SwimEx EDGE Server $tag — Windows Quick Start
          ==============================================
          1. Double-click  swimex-edge-server.bat  to start the server.
          2. Open http://localhost in your browser.
          3. Default login: admin / admin123

          To install as a Windows Service (auto-start on boot):
            Right-click install-service.ps1 → Run with PowerShell (as Administrator)

          To change the HTTP port, edit swimex-edge-server.bat and change HTTP_PORT.
          "@ | Out-File -FilePath "$releaseDir\QUICKSTART.txt" -Encoding utf8

          Compress-Archive -Path "$releaseDir\*" -DestinationPath "swimex-edge-server-${tag}-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-build
          path: swimex-edge-server-${{ inputs.release_tag }}-windows-x64.zip
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Raspberry Pi ARM package
  # Tarball with compiled JS + install script (npm install runs on-device)
  # ──────────────────────────────────────────────────────────
  build-rpi:
    name: Build Raspberry Pi Package
    runs-on: ubuntu-latest
    if: ${{ inputs.build_rpi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build TypeScript
        working-directory: server
        run: npx tsc

      - name: Create RPi release package
        run: |
          TAG="${{ inputs.release_tag }}"
          PKG_DIR="swimex-edge-server-${TAG}-rpi-arm"
          mkdir -p "${PKG_DIR}"

          cp -r server/dist "${PKG_DIR}/"
          cp -r server/public "${PKG_DIR}/"
          cp -r server/config "${PKG_DIR}/"
          cp -r server/templates "${PKG_DIR}/"
          cp server/package.json server/package-lock.json "${PKG_DIR}/"

          mkdir -p "${PKG_DIR}/installer"
          cp server/installer/rpi/install.sh "${PKG_DIR}/installer/"
          chmod +x "${PKG_DIR}/installer/install.sh"

          cp README.md "${PKG_DIR}/" 2>/dev/null || true
          cp MANUAL.md "${PKG_DIR}/" 2>/dev/null || true

          tar -czf "swimex-edge-server-${TAG}-rpi-arm.tar.gz" "${PKG_DIR}"

      - name: Upload RPi artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpi-build
          path: swimex-edge-server-${{ inputs.release_tag }}-rpi-arm.tar.gz
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Docker image (multi-arch: amd64 + arm64)
  # ──────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ inputs.build_docker }}
    needs: build-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ inputs.docker_registry == 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.docker_registry == 'docker.io' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ inputs.docker_registry }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.release_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────────────────
  # GitHub Release — collects all artifacts
  # ──────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-server, build-linux, build-windows-exe, build-rpi]
    if: ${{ always() && inputs.create_release && needs.build-server.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: release-artifacts/

      - name: Download Linux x64 build
        if: ${{ inputs.build_linux && needs.build-linux.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-build
          path: release-artifacts/

      - name: Download Windows build
        if: ${{ inputs.build_windows && needs.build-windows-exe.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-build
          path: release-artifacts/

      - name: Download RPi build
        if: ${{ inputs.build_rpi && needs.build-rpi.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: rpi-build
          path: release-artifacts/

      - name: List release artifacts
        run: ls -lhR release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: SwimEx EDGE ${{ inputs.release_tag }}
          draft: false
          prerelease: ${{ contains(inputs.release_tag, 'rc') || contains(inputs.release_tag, 'beta') || contains(inputs.release_tag, 'alpha') }}
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            ## SwimEx EDGE Server ${{ inputs.release_tag }}

            ### Download Options

            | Platform | File | Notes |
            |----------|------|-------|
            | **Linux x64** | `swimex-edge-server-${{ inputs.release_tag }}-linux-x64.tar.gz` | Self-contained with Node.js. Run `./swimex-edge-server.sh`. |
            | **Linux (generic)** | `swimex-edge-server-${{ inputs.release_tag }}.tar.gz` | Requires Node.js 18+. Run `installer/linux/install.sh`. |
            | **Windows x64** | `swimex-edge-server-${{ inputs.release_tag }}-windows-x64.zip` | Self-contained with Node.js. Double-click `swimex-edge-server.bat`. |
            | **Raspberry Pi** | `swimex-edge-server-${{ inputs.release_tag }}-rpi-arm.tar.gz` | For RPi 3/4/5 (ARM). Run `installer/install.sh`. |
            | **Docker** | See below | Multi-arch (amd64 + arm64). |

            ### Docker

            ```bash
            docker pull ${{ inputs.docker_registry }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ inputs.release_tag }}
            docker run -d -p 80:80 -p 502:502 -v swimex-data:/data \
              ${{ inputs.docker_registry }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ inputs.release_tag }}
            ```

            ### Quick Start

            1. Download the archive for your platform
            2. Extract and follow the included QUICKSTART or run the installer script
            3. Open `http://<server-ip>` in a browser
            4. Default login: **admin** / **admin123**

            See [MANUAL.md](MANUAL.md) for full setup and deployment instructions.
